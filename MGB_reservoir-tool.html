<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Générateur de fichiers Réservoirs — fixed / calib / flag / FLP</title>
<style>
  :root{
    --bg:#f3f6f5; --panel:#ffffff; --border:#e6e9e8; --border-soft:#eef1f0;
    --accent:#2f8f76; --accent-soft:#e6f3ef; --accent-dark:#1f6753;
    --text:#262a2c; --muted:#7c8683; --danger:#c1543b; --danger-soft:#fbe9e5;
    --shadow-sm:0 1px 2px rgba(20,30,28,.05), 0 1px 1px rgba(20,30,28,.04);
    --shadow-md:0 4px 16px rgba(20,40,34,.08);
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  header{background:linear-gradient(135deg,var(--accent-dark),#274a41);color:#fff;padding:20px 26px;
    display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
  header .htxt h1{margin:0;font-size:19px;font-weight:650;letter-spacing:-.01em;}
  header .htxt p{margin:5px 0 0;font-size:12.5px;color:#cfe6de;}
  header .htxt p.credit{color:#a9c9bf;font-size:11px;margin-top:6px;}
  .lang-switch{display:flex;background:rgba(255,255,255,.12);border-radius:999px;padding:3px;flex:none;}
  .lang-switch button{border:none;background:transparent;color:#e6f2ee;padding:6px 14px;border-radius:999px;
    font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.02em;}
  .lang-switch button.active{background:#fff;color:var(--accent-dark);box-shadow:var(--shadow-sm);}

  .wrap{max-width:1180px;margin:0 auto;padding:20px 20px 60px;}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--panel);
    border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;box-shadow:var(--shadow-sm);}
  .toolbar .grp{display:flex;gap:7px;align-items:center;padding-right:16px;margin-right:2px;
    border-right:1px solid var(--border-soft);}
  .toolbar .grp:last-child{border-right:none;padding-right:0;margin-right:0;}
  label{font-size:12.5px;color:var(--muted);}
  button{cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;
    padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:600;transition:transform .08s ease,opacity .12s ease;}
  button.secondary{background:#fff;color:var(--accent-dark);border-color:var(--border);box-shadow:var(--shadow-sm);}
  button.danger{background:#fff;color:var(--danger);border-color:var(--danger-soft);}
  button:hover{opacity:.9;}
  button:active{transform:scale(.97);}
  input[type=text], input[type=number]{
    border:1px solid var(--border);border-radius:7px;padding:6px 8px;font-size:12.5px;width:100%;background:#fff;
  }
  input[type=text]:focus, input[type=number]:focus{outline:none;border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);}
  input[type=number]{width:92px;}
  .tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .tab-btn{background:transparent;color:var(--muted);border:1px solid transparent;
    padding:8px 16px;border-radius:999px;font-size:13px;cursor:pointer;font-weight:500;}
  .tab-btn:hover{background:#eef2f1;}
  .tab-btn.active{background:var(--panel);font-weight:650;color:var(--accent-dark);box-shadow:var(--shadow-sm);}
  .panel{background:var(--panel);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);}
  fieldset{border:none;background:#fafcfb;box-shadow:inset 0 0 0 1px var(--border-soft);
    border-radius:10px;margin-bottom:16px;padding:14px 16px 16px;}
  legend{font-size:13px;font-weight:650;color:var(--accent-dark);padding:0 6px;display:flex;align-items:center;gap:6px;}
  legend::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;}
  .row{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:8px;}
  .field{display:flex;flex-direction:column;gap:4px;min-width:150px;}
  .field.grow{flex:1;}
  .hint{font-size:11px;color:var(--muted);margin-top:2px;}
  table{border-collapse:collapse;width:100%;font-size:12.5px;}
  table.gate th, table.gate td{border:1px solid var(--border-soft);padding:4px;text-align:center;}
  table.gate th{background:#f2f5f4;color:var(--muted);font-weight:600;}
  table.gate input{width:64px;text-align:center;padding:4px;border-radius:5px;}
  .dyn-table{width:100%;border-collapse:collapse;margin-top:6px;}
  .dyn-table th, .dyn-table td{border:1px solid var(--border-soft);padding:5px 7px;font-size:12px;}
  .dyn-table th{background:#f2f5f4;color:var(--muted);}
  .dyn-table input{width:100%;border:none;padding:2px;font-size:12px;background:transparent;}
  .dyn-table .rm{color:var(--danger);cursor:pointer;font-weight:bold;border:none;background:none;font-size:14px;}
  .small-btn{font-size:11.5px;padding:5px 10px;margin-top:8px;}
  .hsv-wrap{max-height:340px;overflow:auto;border-radius:8px;margin-top:6px;box-shadow:inset 0 0 0 1px var(--border-soft);}
  textarea{width:100%;min-height:76px;font-family:'SF Mono',Consolas,monospace;font-size:12px;
    border:1px solid var(--border);border-radius:7px;padding:7px;background:#fff;}
  .res-name-input{font-weight:650;font-size:15px;border:none;border-bottom:2px solid var(--border-soft);
    background:transparent;width:230px;padding:3px 0;}
  .res-name-input:focus{outline:none;border-bottom-color:var(--accent);}
  .footnote{font-size:11px;color:var(--muted);margin-top:6px;}
  .log{font-family:'SF Mono',Consolas,monospace;font-size:11.5px;background:#16241f;color:#8fe0bf;border-radius:8px;
    padding:9px 12px;margin-top:10px;max-height:120px;overflow:auto;white-space:pre-wrap;display:none;}
  .col-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .col-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  /* ---- type de réservoir : contrôle segmenté ---- */
  .seg-wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--accent-soft);
    border-radius:10px;padding:10px 14px;margin-bottom:16px;}
  .seg-control{display:flex;background:#fff;border-radius:8px;padding:3px;box-shadow:var(--shadow-sm);}
  .seg-btn{border:none;background:transparent;padding:7px 14px;border-radius:6px;font-size:12.5px;
    font-weight:600;color:var(--muted);cursor:pointer;}
  .seg-btn.active{background:var(--accent);color:#fff;}
  .seg-hint{font-size:11.5px;color:var(--accent-dark);flex:1;min-width:200px;}

  /* ---- Info-bulles de description ---- */
  .lbl-row{display:flex;align-items:center;gap:5px;}
  .info-ico{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;
    border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;font-style:normal;
    cursor:help;flex:none;line-height:1;position:relative;}
  .info-ico .tip{display:none;position:absolute;left:50%;top:120%;transform:translateX(-50%);
    width:240px;background:#20302b;color:#eaf5f0;font-size:11px;font-weight:400;line-height:1.45;
    padding:8px 9px;border-radius:8px;z-index:50;box-shadow:var(--shadow-md);text-align:left;}
  .info-ico:hover .tip, .info-ico:focus .tip{display:block;}
  .fieldset-desc{font-size:11.5px;color:var(--muted);margin:-2px 0 12px;line-height:1.55;}
  .fieldset-desc b{color:var(--text);}
  .disabled-note{font-size:11.5px;color:var(--muted);background:#f2f4f3;border-radius:8px;padding:8px 10px;
    margin:4px 0 4px;font-style:italic;}

  /* ---- Fiche récapitulative (overlay) ---- */
  .modal-overlay{position:fixed;inset:0;background:rgba(18,26,23,.55);display:none;
    align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(2px);}
  .modal-overlay.open{display:flex;}
  .modal-box{background:#fff;border-radius:14px;max-width:1000px;width:100%;max-height:92vh;
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;
    border-bottom:1px solid var(--border-soft);background:#fafcfb;flex-wrap:wrap;gap:8px;}
  .modal-head h2{font-size:15px;margin:0;color:var(--accent-dark);}
  .modal-head .grp{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .modal-body{overflow:auto;padding:0;background:#e9ebec;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;}
  select#sheetResSelect{border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12.5px;}

  /* Page A4 de la fiche (s'imprime telle quelle) */
  .sheet-page{background:#fff;width:210mm;min-height:297mm;margin:14px auto;padding:14mm 13mm;
    box-shadow:0 2px 10px rgba(0,0,0,.18);color:#1c1f22;font-family:-apple-system,Segoe UI,Arial,sans-serif;}
  .sheet-page h1{font-size:17px;margin:0 0 2px;color:var(--accent-dark);}
  .sheet-page .sub{font-size:10.5px;color:#666;margin:0 0 12px;}
  .sheet-badge{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
    padding:2px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent-dark);margin-left:8px;vertical-align:2px;}
  .sheet-grid{display:grid;grid-template-columns:1.05fr 0.95fr;gap:10mm;}
  .sheet-block{margin-bottom:9px;}
  .sheet-block h3{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--accent-dark);
    border-bottom:1.4px solid var(--accent-dark);margin:0 0 5px;padding-bottom:2px;}
  .kv-table{width:100%;border-collapse:collapse;font-size:10.6px;}
  .kv-table td{padding:2.5px 4px;border-bottom:1px solid #e7e9ea;vertical-align:top;}
  .kv-table td.k{color:#555;width:58%;}
  .kv-table td.v{font-weight:600;text-align:right;white-space:nowrap;}
  .kv-table tr.muted td{color:#aaa;font-style:italic;}
  .sheet-fig{border:1px solid #e2e5e4;border-radius:8px;padding:6px;margin-bottom:9px;background:#fbfcfc;}
  .sheet-fig .cap{font-size:9.5px;color:#777;text-align:center;margin-top:3px;}
  .sheet-note{font-size:9px;color:#888;margin-top:10mm;border-top:1px solid #e7e9ea;padding-top:5px;}
  .month-mini{width:100%;border-collapse:collapse;font-size:8.6px;margin-top:3px;}
  .month-mini th,.month-mini td{border:1px solid #e7e9ea;padding:2px 1px;text-align:center;}
  .month-mini th{background:#f0f2f1;color:#555;font-weight:600;}

  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{position:absolute;left:0;top:0;width:100%;}
    .sheet-page{box-shadow:none;margin:0;width:auto;min-height:0;page-break-after:always;}
    .sheet-page:last-child{page-break-after:auto;}
  }

  /* ---- Onglets de niveau supérieur (Configurateur / Schéma) ---- */
  .outer-tabs{display:flex;gap:0;background:#16241f;padding:0 20px;position:sticky;top:0;z-index:300;}
  .outer-tab-btn{background:transparent;border:none;color:#a9c9bf;padding:12px 20px;font-size:13px;
    font-weight:650;cursor:pointer;border-bottom:3px solid transparent;letter-spacing:.01em;}
  .outer-tab-btn.active{color:#fff;border-bottom-color:var(--accent);background:rgba(255,255,255,.04);}
  .outer-tab-btn:hover{color:#fff;}
  #page-schema{display:none;height:calc(100vh - 42px);}
  #page-schema.active{display:block;}
  #page-config.hidden{display:none;}
  #damFrame{width:100%;height:100%;border:none;display:block;background:#f8fafc;}
  .schema-loading{display:flex;align-items:center;justify-content:center;height:100%;color:#7c8683;font-size:13px;gap:8px;}
</style>
</head>
<body>

<div class="outer-tabs" id="outerTabs">
  <button type="button" class="outer-tab-btn active" data-page="config" onclick="switchOuterPage('config')">🛠️ <span id="ot_config_label">Configurateur (fixed / calib / flag / FLP)</span></button>
  <button type="button" class="outer-tab-btn" data-page="schema" onclick="switchOuterPage('schema')">📐 <span id="ot_schema_label">Schéma pédagogique interactif</span></button>
</div>
<div id="page-config">

<header>
  <div class="htxt">
    <h1 id="hd_title">Configurateur de réservoirs — Modèle MGB</h1>
    <p id="hd_subtitle">Formulaire unique, hors-ligne, qui génère les 4 fichiers texte attendus par le modèle MGB. Aucune donnée ne quitte votre navigateur.</p>
    <p class="credit" id="hd_credit">Développé par Hydro Matters ©</p>
  </div>
  <div class="lang-switch" id="langSwitch">
    <button data-lang="fr" class="active">FR</button>
    <button data-lang="en">EN</button>
  </div>
</header>

<div class="wrap">

  <div class="toolbar">
    <div class="grp">
      <label id="tb_nres_label">Nombre de réservoirs</label>
      <input type="number" id="nResInput" min="1" max="30" value="1" style="width:60px">
      <button class="secondary" id="applyNRes">Appliquer</button>
    </div>
    <div class="grp">
      <label id="tb_import_label">Importer un fichier existant :</label>
      <button class="secondary" onclick="document.getElementById('imp_fixed').click()">fixed.txt</button>
      <button class="secondary" onclick="document.getElementById('imp_calib').click()">calib.txt</button>
      <button class="secondary" onclick="document.getElementById('imp_flag').click()">flag.txt</button>
      <button class="secondary" onclick="document.getElementById('imp_flp').click()">.FLP (H-S-V)</button>
      <input type="file" id="imp_fixed" style="display:none" accept=".txt">
      <input type="file" id="imp_calib" style="display:none" accept=".txt">
      <input type="file" id="imp_flag" style="display:none" accept=".txt">
      <input type="file" id="imp_flp" style="display:none" accept=".flp,.FLP,.txt">
    </div>
    <div class="grp">
      <button id="exportAll">⬇ <span id="tb_export_label">Générer les 4 fichiers</span></button>
    </div>
    <div class="grp" style="border-right:none">
      <button class="secondary" id="openSheetBtn">📄 <span id="tb_sheet_label">Fiche récapitulative</span></button>
    </div>
  </div>

  <div class="tabs" id="tabsBar"></div>
  <div class="panel" id="resPanel"></div>
  <div class="log" id="log"></div>

</div>

<!-- ============================================================
     MODALE : FICHE RECAPITULATIVE (1 page A4 / réservoir)
     ============================================================ -->
<div class="modal-overlay" id="sheetOverlay">
  <div class="modal-box">
    <div class="modal-head">
      <h2 id="md_title">Fiche récapitulative du réservoir</h2>
      <div class="grp">
        <label id="md_res_label">Réservoir :</label>
        <select id="sheetResSelect"></select>
        <label style="display:flex;align-items:center;gap:4px;margin-left:6px">
          <input type="checkbox" id="sheetAllChk" style="width:auto"> <span id="md_all_label">tous les réservoirs</span>
        </label>
        <button class="secondary" id="sheetPdfBtn">🖨 <span id="md_pdf_label">Exporter en PDF</span></button>
        <button class="secondary" id="sheetDocBtn">⬇ <span id="md_doc_label">Exporter en .doc (Word)</span></button>
        <button class="modal-close" id="sheetCloseBtn" title="Fermer">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div id="printArea"></div>
    </div>
  </div>
</div>

</div>

<div id="page-schema">
  <div class="schema-loading" id="schemaLoading">⏳ <span id="ot_loading_label">Chargement du schéma…</span></div>
  <iframe id="damFrame" title="Schéma pédagogique interactif" style="display:none"></iframe>
</div>

<script>
/* ============================================================
   I18N — dictionnaire de textes FR / EN
   ============================================================ */
let lang = 'fr';
function t(key){
  const d = STR[key];
  if(!d) return key;
  return d[lang] !== undefined ? d[lang] : d.fr;
}
const STR = {
  hd_title:{fr:'Configurateur de réservoirs — Modèle MGB', en:'Reservoir Configurator — MGB Model'},
  hd_subtitle:{fr:"Formulaire unique, hors-ligne, qui génère les 4 fichiers texte attendus par le modèle MGB. Aucune donnée ne quitte votre navigateur.",
               en:"A single offline form that generates the 4 text files expected by the MGB model. No data ever leaves your browser."},
  hd_credit:{fr:'Développé par Hydro Matters ©', en:'Built by Hydro Matters ©'},
  tb_nres_label:{fr:'Nombre de réservoirs', en:'Number of reservoirs'},
  tb_apply:{fr:'Appliquer', en:'Apply'},
  tb_import_label:{fr:'Importer un fichier existant :', en:'Import an existing file:'},
  tb_export_label:{fr:'Générer les 4 fichiers', en:'Generate the 4 files'},
  tb_sheet_label:{fr:'Fiche récapitulative', en:'Summary sheet'},
  tabDefaultName:{fr:'Réservoir', en:'Reservoir'},
  resNameLabel:{fr:'Nom du réservoir', en:'Reservoir name'},
  removeBtn:{fr:'Supprimer ce réservoir', en:'Delete this reservoir'},

  typeNatural:{fr:'🌿 Naturel (sans vannes)', en:'🌿 Natural (no gates)'},

  typeNaturalHint:{fr:"Réservoir naturel : aucune gestion active. L'eau ne s'évacue que par surverse libre au-dessus du déversoir. Les paramètres de vannes, de conduite forcée (penstock), de niveau d'exploitation (yOptLevel) et de débit environnemental (Qenv) sont sans objet et ignorés à l'export.",
                    en:"Natural reservoir: no active management. Water is only released by free overflow above the spillway. Gate, penstock, operating-level (yOptLevel) and environmental-flow (Qenv) parameters are not applicable and are ignored on export."},

              en:"<b>Structural characteristics</b> of the structure (outlet geometry and reference levels). These values describe the dam itself and are not adjusted during calibration."},
  outletLabel:{fr:"ID mini-bassin de l'exutoire (outlet_mini_id)", en:'Outlet mini-catchment ID (outlet_mini_id)'},

  spillCrestLabel:{fr:'ySpillwayCrest [m]', en:'ySpillwayCrest [m]'},
  spillLengthLabel:{fr:'SpillwayLength [m]', en:'SpillwayLength [m]'},
  yOptLevelLabel:{fr:'yOptLevel [m]', en:'yOptLevel [m]'},
  gateBlockNote:{fr:'Vannes, conduite forcée (penstock), niveau d\'exploitation (yOptLevel) et minOpLevel désactivés — réservoir naturel : ces paramètres seront exportés à 0.', en:'Gates, penstock, operating level (yOptLevel) and minOpLevel disabled — natural reservoir: these parameters will be exported as 0.'},

  calibLegend:{fr:'Paramètres de calibration (calib.txt)', en:'Calibration parameters (calib.txt)'},
  calibDesc:{fr:"Paramètres <b>ajustés lors de la calibration</b> du modèle : conditions initiales, règles d'exploitation et coefficients hydrauliques.",
              en:"Parameters <b>adjusted during model calibration</b>: initial conditions, operating rules and hydraulic coefficients."},
  Y0Label:{fr:'Y0 — niveau initial [m]', en:'Y0 — initial level [m]'},

  yFillTargetLabel:{fr:'yFillTarget [m]', en:'yFillTarget [m]'},
  CdPenstockLabel:{fr:'Cd_penstock', en:'Cd_penstock'},
  CdGateLabel:{fr:'Cd_gate', en:'Cd_gate'},
  CdSpillwayLabel:{fr:'Cd_spillway', en:'Cd_spillway'},
  gateFracLabel:{fr:'gate_frac mensuel [0–1]', en:'Monthly gate_frac [0–1]'},
  gateFracHiddenNote:{fr:"Tableau masqué — réservoir naturel : gate_frac sera exporté à 0 pour les 12 mois.", en:"Table hidden — natural reservoir: gate_frac will be exported as 0 for all 12 months."},

  flagLegend:{fr:'Topologie (flag.txt)', en:'Topology (flag.txt)'},
  flagDesc:{fr:"Décrit la <b>position du réservoir dans le réseau hydrographique</b> du modèle MGB : quels mini-bassins versants alimentent le réservoir, et quels mini-bassins sont recouverts par sa retenue.",
             en:"Describes the <b>position of the reservoir in the MGB drainage network</b>: which mini-catchments feed the reservoir, and which mini-catchments are covered by its pool."},
  flagSyncHint:{fr:"mini_Qout est synchronisé automatiquement avec « ID mini-bassin de l'exutoire » ci-dessus.", en:'mini_Qout is automatically synced with the "outlet mini-catchment ID" above.'},
  qinLabel:{fr:'mini_Qin — mini(s) amont (nQin = nombre de lignes)', en:'mini_Qin — upstream mini-catchment(s) (nQin = number of rows)'},

  mlistLabel:{fr:'Liste des minis inondées (section 2 — doit inclure Qin et Qout)', en:'List of flooded mini-catchments (section 2 — must include Qin and Qout)'},
  addMlist:{fr:'+ ajouter une mini', en:'+ add mini-catchment'},

function dsc(key){ const d = PARAM_DESC[key]; return d ? (d[lang]!==undefined?d[lang]:d.fr) : ''; }

let reservoirs = [];
let activeIdx = 0;

function emptyReservoir(name){
  return {
    name: name || "Réservoir",
    type: 'managed', // 'managed' (avec vannes) ou 'natural' (sans gestion)
    // --- fixed.txt ---
    outlet_mini_id: "",
    nPenstock: 1, dPenstock: 0, minOpLevel: 0,
    nGates: 1, yGateSill: 0, gateWidth: 0, maxOpening: 0,
    spillCrest: 0, spillLength: 0,
    yOptLevel: 0,
    // --- calib.txt ---
    Y0: 0,
    gate_frac: new Array(12).fill(0.02),
    Qenv: 0,
    Cd_penstock: 0.50, Cd_gate: 0.62, Cd_spillway: 0.40,
    yFillTarget: 0,
    // --- flag.txt ---
    mini_Qin: [""],     // liste des mini amont (nQin = longueur)
    mini_list: [""],    // section 2 : toutes les minis inondées
    // --- FLP (H-S-V) ---
    Z0: 0,
    hsv: [{z:0,a:0,v:0},{z:0,a:0,v:0}]
  };
}

function log(msg){
  const l = document.getElementById('log');
  l.style.display='block';
  l.textContent = msg;
}

/* ============================================================
   TEXTES STATIQUES (hors DOM généré dynamiquement)
   ============================================================ */
function updateStaticText(){
  const map = {
    hd_title:'hd_title', hd_subtitle:'hd_subtitle', hd_credit:'hd_credit',
    tb_nres_label:'tb_nres_label', tb_import_label:'tb_import_label',
    tb_export_label:'tb_export_label', tb_sheet_label:'tb_sheet_label',
    md_title:'md_title', md_res_label:'md_res_label', md_all_label:'md_all_label',
    md_pdf_label:'md_pdf_label', md_doc_label:'md_doc_label'
  };
  Object.keys(map).forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.innerHTML = t(map[id]);
  });
  document.getElementById('applyNRes').lastChild.textContent = ' '+t('tb_apply');
  document.getElementById('applyNRes').textContent = t('tb_apply');
  document.title = lang==='fr'
    ? 'Générateur de fichiers Réservoirs — fixed / calib / flag / FLP'
    : 'Reservoir File Generator — fixed / calib / flag / FLP';
}

document.getElementById('langSwitch').addEventListener('click', e=>{
  const btn = e.target.closest('button[data-lang]');
  if(!btn) return;
  lang = btn.dataset.lang;
  document.querySelectorAll('#langSwitch button').forEach(b=>b.classList.toggle('active', b===btn));
  updateStaticText();
  renderAll();
  if(document.getElementById('sheetOverlay').classList.contains('open')){
    populateSheetSelect();
    renderSheet();
  }
});

/* ============================================================
   RENDU UI
   ============================================================ */
function renderAll(){
  renderTabs();
  renderPanel();
}

function renderTabs(){
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = '';
  reservoirs.forEach((r,i)=>{
    const b = document.createElement('div');
    b.className = 'tab-btn' + (i===activeIdx ? ' active':'');
    b.textContent = (i+1)+'. '+(r.name||t('tabDefaultName')+' '+(i+1));
    b.onclick = ()=>{ syncActiveFromDOM(); activeIdx=i; renderAll(); };
    bar.appendChild(b);
  });
}

function gateMonthsHeader(){
  return lang==='fr'
    ? ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']
    : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
}

function lbl(text, key){
  const d = dsc(key);
  if(!d) return `<label>${text}</label>`;
  return `<div class="lbl-row"><label>${text}</label><span class="info-ico" tabindex="0">i<span class="tip">${d}</span></span></div>`;
}

function renderPanel(){
  const r = reservoirs[activeIdx];
  const p = document.getElementById('resPanel');
  if(!r){ p.innerHTML=''; return; }
  const isNatural = r.type === 'natural';

  let html = '';

  html += `<div class="row" style="align-items:center;justify-content:space-between">
      <div><label>${t('resNameLabel')}&nbsp;</label>
      <input class="res-name-input" id="f_name" value="${esc(r.name)}"></div>
      <button class="danger small-btn" onclick="removeReservoir(${activeIdx})">${t('removeBtn')}</button>
    </div>`;

  // ---- TYPE ----
  html += `<div class="seg-wrap">
      <div>
        <div style="font-size:12px;font-weight:650;color:var(--accent-dark);margin-bottom:6px">${t('typeLabel')}</div>
        <div class="seg-control" id="typeControl">
          <button type="button" class="seg-btn ${!isNatural?'active':''}" data-type="managed">${t('typeManaged')}</button>
          <button type="button" class="seg-btn ${isNatural?'active':''}" data-type="natural">${t('typeNatural')}</button>
        </div>
      </div>
      <div class="seg-hint">${isNatural ? t('typeNaturalHint') : t('typeManagedHint')}</div>
    </div>`;

  // ---- FIXED ----
  html += `<fieldset><legend>${t('fixedLegend')}</legend>
    <div class="fieldset-desc">${t('fixedDesc')}</div>
    <div class="row">
      <div class="field">${lbl(t('outletLabel'),"outlet_mini_id")}
        <input type="text" id="f_outlet" value="${esc(r.outlet_mini_id)}"></div>
    </div>
    <div class="row">
      ${isNatural ? '' : `<div class="field">${lbl(t('nPenstockLabel'),"nPenstock")}<input type="number" id="f_nPenstock" value="${r.nPenstock}"></div>
      <div class="field">${lbl(t('dPenstockLabel'),"dPenstock")}<input type="number" step="0.01" id="f_dPenstock" value="${r.dPenstock}"></div>`}
      ${isNatural ? '' : `<div class="field">${lbl(t('minOpLevelLabel'),"minOpLevel")}<input type="number" step="0.01" id="f_minOpLevel" value="${r.minOpLevel}"></div>`}
    </div>
    <div class="row">
      <div class="field">${lbl(t('spillCrestLabel'),"spillCrest")}<input type="number" step="0.01" id="f_spillCrest" value="${r.spillCrest}"></div>
      <div class="field">${lbl(t('spillLengthLabel'),"spillLength")}<input type="number" step="0.01" id="f_spillLength" value="${r.spillLength}"></div>
      ${isNatural ? '' : `<div class="field">${lbl(t('yOptLevelLabel'),"yOptLevel")}<input type="number" step="0.01" id="f_yOptLevel" value="${r.yOptLevel}"></div>`}
    </div>
    ${isNatural
      ? `<div class="disabled-note">${t('gateBlockNote')}</div>`
      : `<div class="row">
          <div class="field">${lbl(t('nGatesLabel'),"nGates")}<input type="number" id="f_nGates" value="${r.nGates}"></div>
          <div class="field">${lbl(t('yGateSillLabel'),"yGateSill")}<input type="number" step="0.01" id="f_yGateSill" value="${r.yGateSill}"></div>
          <div class="field">${lbl(t('gateWidthLabel'),"gateWidth")}<input type="number" step="0.01" id="f_gateWidth" value="${r.gateWidth}"></div>
          <div class="field">${lbl(t('maxOpeningLabel'),"maxOpening")}<input type="number" step="0.01" id="f_maxOpening" value="${r.maxOpening}"></div>
        </div>`}
  </fieldset>`;

  // ---- CALIB ----
  html += `<fieldset><legend>${t('calibLegend')}</legend>
    <div class="fieldset-desc">${t('calibDesc')}</div>
    <div class="row">
      <div class="field">${lbl(t('Y0Label'),"Y0")}<input type="number" step="0.01" id="f_Y0" value="${r.Y0}"></div>
      ${isNatural ? '' : `<div class="field">${lbl(t('QenvLabel'),"Qenv")}<input type="number" step="0.01" id="f_Qenv" value="${r.Qenv}"></div>`}
      <div class="field">${lbl(t('yFillTargetLabel'),"yFillTarget")}<input type="number" step="0.01" id="f_yFillTarget" value="${r.yFillTarget}"></div>
    </div>
    <div class="row">
      ${isNatural ? '' : `<div class="field">${lbl(t('CdPenstockLabel'),"Cd_penstock")}<input type="number" step="0.01" id="f_Cd_penstock" value="${r.Cd_penstock}"></div>
      <div class="field">${lbl(t('CdGateLabel'),"Cd_gate")}<input type="number" step="0.01" id="f_Cd_gate" value="${r.Cd_gate}"></div>`}
      <div class="field">${lbl(t('CdSpillwayLabel'),"Cd_spillway")}<input type="number" step="0.01" id="f_Cd_spillway" value="${r.Cd_spillway}"></div>
    </div>
    ${isNatural ? `<div class="disabled-note">${lang==='fr'?"Qenv, Cd_penstock : sans objet pour un réservoir naturel (pas de conduite forcée ni de débit environnemental imposé).":"Qenv, Cd_penstock: not applicable to a natural reservoir (no penstock, no enforced environmental flow)."}</div>` : ''}
    ${isNatural
      ? `<div class="disabled-note">${t('gateFracHiddenNote')}</div>`
      : `${lbl(t('gateFracLabel'),"gate_frac")}
         <table class="gate"><tr>${gateMonthsHeader().map(m=>`<th>${m}</th>`).join('')}</tr>
         <tr>${r.gate_frac.map((v,i)=>`<td><input type="number" step="0.001" min="0" max="1" id="f_gate_${i}" value="${v}"></td>`).join('')}</tr>
         </table>`}
  </fieldset>`;

  // ---- FLAG ----
  html += `<fieldset><legend>${t('flagLegend')}</legend>
    <div class="fieldset-desc">${t('flagDesc')}</div>
    <div class="hint" style="margin-bottom:6px">${t('flagSyncHint')}</div>
    <div class="col-2">
      <div>
        ${lbl(t('qinLabel'),"mini_Qin")}
        ${dynListTable('qin', r.mini_Qin)}
        <button class="secondary small-btn" onclick="addRow('qin')">${t('addQin')}</button>
      </div>
      <div>
        ${lbl(t('mlistLabel'),"mini_list")}
        ${dynListTable('mlist', r.mini_list)}
        <button class="secondary small-btn" onclick="addRow('mlist')">${t('addMlist')}</button>
      </div>
    </div>
  </fieldset>`;

  // ---- FLP / HSV ----
  html += `<fieldset><legend>${t('flpLegend')}</legend>
    <div class="fieldset-desc">${t('flpDesc')}</div>
    <div class="row">
      <div class="field">${lbl(t('Z0Label'),"Z0")}
        <input type="number" step="0.01" id="f_Z0" value="${r.Z0}"></div>
    </div>
    <div class="hint">${t('pasteHint')}</div>
    <textarea id="hsv_paste" placeholder="283.00 0.00 0.0000&#10;283.22 0.01 0.0000&#10;..."></textarea>
    <div style="margin:6px 0">
      <button class="secondary small-btn" onclick="importHSVPaste()">${t('importPasteBtn')}</button>
      <button class="secondary small-btn" onclick="exportHSVToPaste()">${t('exportPasteBtn')}</button>
      <button class="secondary small-btn" onclick="addHSVRow()">${t('addPointBtn')}</button>
      <button class="danger small-btn" onclick="clearHSV()">${t('clearBtn')}</button>
    </div>
    <div class="hsv-wrap"><table class="dyn-table" id="hsvTable">
      <thead><tr><th>#</th><th>Zfp [m]</th><th>${lang==='fr'?'Aire':'Area'} [km²]</th><th>${lang==='fr'?'Volume':'Volume'} [km³]</th><th></th></tr></thead>

    </table></div>
    <div class="footnote">${r.hsv.length} ${t('pointsCountSuffix')}</div>
  </fieldset>`;

  p.innerHTML = html;
  renderHSVBody();

  document.getElementById('typeControl').addEventListener('click', e=>{
    const btn = e.target.closest('button[data-type]');
    if(!btn) return;
    syncActiveFromDOM();
    reservoirs[activeIdx].type = btn.dataset.type;
    renderPanel();
  });
}

function dynListTable(kind, arr){
  let rows = arr.map((v,i)=>`<tr>
      <td style="width:30px;text-align:center">${i+1}</td>
      <td><input type="text" data-kind="${kind}" data-i="${i}" value="${esc(v)}"></td>
      <td style="width:30px;text-align:center"><button class="rm" onclick="removeRow('${kind}',${i})">✕</button></td>
    </tr>`).join('');
  return `<table class="dyn-table"><tbody id="tbl_${kind}">${rows}</tbody></table>`;
}

function renderHSVBody(){
  const r = reservoirs[activeIdx];
  const body = document.getElementById('hsvBody');
  if(!body) return;
  body.innerHTML = r.hsv.map((pt,i)=>`<tr>
      <td style="width:34px;text-align:center">${i+1}</td>
      <td><input type="number" step="0.01" data-hsv="z" data-i="${i}" value="${pt.z}"></td>
      <td><input type="number" step="0.01" data-hsv="a" data-i="${i}" value="${pt.a}"></td>
      <td><input type="number" step="0.0001" data-hsv="v" data-i="${i}" value="${pt.v}"></td>
      <td style="width:30px;text-align:center"><button class="rm" onclick="removeHSVRow(${i})">✕</button></td>
    </tr>`).join('');
}

/* ============================================================
   SYNCHRO DOM -> MODELE (avant changement d'onglet / export)
   ============================================================ */
function syncActiveFromDOM(){
  const r = reservoirs[activeIdx];
  if(!r) return;
  const v = id => { const el=document.getElementById(id); return el? el.value : undefined; };
  const num = id => { const x = parseFloat(v(id)); return isNaN(x)?undefined:x; };

  r.name = v('f_name') ?? r.name;
  r.outlet_mini_id = v('f_outlet') ?? r.outlet_mini_id;
  r.nPenstock = parseInt(v('f_nPenstock')||r.nPenstock)||r.nPenstock;
  if(num('f_dPenstock')!==undefined) r.dPenstock = num('f_dPenstock');
  if(num('f_minOpLevel')!==undefined) r.minOpLevel = num('f_minOpLevel');
  if(v('f_nGates')!==undefined) r.nGates = parseInt(v('f_nGates')||r.nGates)||r.nGates;
  if(num('f_yGateSill')!==undefined) r.yGateSill = num('f_yGateSill');
  if(num('f_gateWidth')!==undefined) r.gateWidth = num('f_gateWidth');
  if(num('f_maxOpening')!==undefined) r.maxOpening = num('f_maxOpening');
  if(num('f_spillCrest')!==undefined) r.spillCrest = num('f_spillCrest');
  if(num('f_spillLength')!==undefined) r.spillLength = num('f_spillLength');
  if(num('f_yOptLevel')!==undefined) r.yOptLevel = num('f_yOptLevel');

  if(num('f_Y0')!==undefined) r.Y0 = num('f_Y0');
  if(num('f_Qenv')!==undefined) r.Qenv = num('f_Qenv');
  if(num('f_yFillTarget')!==undefined) r.yFillTarget = num('f_yFillTarget');
  if(num('f_Cd_penstock')!==undefined) r.Cd_penstock = num('f_Cd_penstock');
  if(num('f_Cd_gate')!==undefined) r.Cd_gate = num('f_Cd_gate');
  if(num('f_Cd_spillway')!==undefined) r.Cd_spillway = num('f_Cd_spillway');
  for(let i=0;i<12;i++){
    const x = parseFloat(v('f_gate_'+i));
    if(!isNaN(x)) r.gate_frac[i] = x;
  }

  document.querySelectorAll('[data-kind="qin"]').forEach(el=>{
    r.mini_Qin[parseInt(el.dataset.i)] = el.value;
  });
  document.querySelectorAll('[data-kind="mlist"]').forEach(el=>{
    r.mini_list[parseInt(el.dataset.i)] = el.value;
  });

  if(num('f_Z0')!==undefined) r.Z0 = num('f_Z0');
  document.querySelectorAll('[data-hsv]').forEach(el=>{
    const i = parseInt(el.dataset.i);
    const k = el.dataset.hsv;
    const x = parseFloat(el.value);
    if(r.hsv[i]) r.hsv[i][k] = isNaN(x)?0:x;
  });
}

/* ============================================================
   ACTIONS UI : listes dynamiques
   ============================================================ */
function addRow(kind){
  syncActiveFromDOM();
  const r = reservoirs[activeIdx];
  if(kind==='qin') r.mini_Qin.push("");
  if(kind==='mlist') r.mini_list.push("");
  renderPanel();
}
function removeRow(kind,i){
  syncActiveFromDOM();
  const r = reservoirs[activeIdx];
  if(kind==='qin') r.mini_Qin.splice(i,1);
  if(kind==='mlist') r.mini_list.splice(i,1);
  if(r.mini_Qin.length===0) r.mini_Qin=[""];
  if(r.mini_list.length===0) r.mini_list=[""];
  renderPanel();
}
function addHSVRow(){
  syncActiveFromDOM();
  reservoirs[activeIdx].hsv.push({z:0,a:0,v:0});
  renderPanel();
}
function removeHSVRow(i){
  syncActiveFromDOM();
  reservoirs[activeIdx].hsv.splice(i,1);
  if(reservoirs[activeIdx].hsv.length===0) reservoirs[activeIdx].hsv=[{z:0,a:0,v:0}];
  renderPanel();
}
function clearHSV(){
  syncActiveFromDOM();
  reservoirs[activeIdx].hsv = [{z:0,a:0,v:0}];
  renderPanel();
}
function importHSVPaste(){
  syncActiveFromDOM();
  const txt = document.getElementById('hsv_paste').value.trim();
  if(!txt){ log(lang==='fr' ? "Zone de collage vide." : "Paste area is empty."); return; }
  const lines = txt.split(/\r?\n/).filter(l=>l.trim().length);
  const pts = [];
  for(const line of lines){
    const parts = line.trim().split(/[\s,;\t]+/).map(Number);
    if(parts.length>=3 && parts.every(x=>!isNaN(x))){
      pts.push({z:parts[0], a:parts[1], v:parts[2]});
    }
  }
  if(pts.length===0){ log(lang==='fr' ? "Aucune ligne valide reconnue (attendu: Zfp Aire Vol)." : "No valid line recognized (expected: Zfp Area Vol)."); return; }
  reservoirs[activeIdx].hsv = pts;
  renderPanel();
  log(lang==='fr' ? (pts.length+" point(s) importé(s) dans la courbe H-S-V.") : (pts.length+" point(s) imported into the E-A-V curve."));
}
function exportHSVToPaste(){
  syncActiveFromDOM();
  const r = reservoirs[activeIdx];
  document.getElementById('hsv_paste').value = r.hsv.map(p=>`${p.z}\t${p.a}\t${p.v}`).join('\n');
}

function removeReservoir(i){
  if(reservoirs.length<=1){ log(lang==='fr' ? "Il doit rester au moins un réservoir." : "At least one reservoir must remain."); return; }
  syncActiveFromDOM();
  reservoirs.splice(i,1);
  activeIdx = Math.max(0, Math.min(activeIdx, reservoirs.length-1));
  document.getElementById('nResInput').value = reservoirs.length;
  renderAll();
}

document.getElementById('applyNRes').onclick = ()=>{
  syncActiveFromDOM();
  let n = parseInt(document.getElementById('nResInput').value);
  if(isNaN(n) || n<1) n=1;
  while(reservoirs.length < n) reservoirs.push(emptyReservoir((lang==='fr'?'Réservoir ':'Reservoir ')+(reservoirs.length+1)));
  while(reservoirs.length > n) reservoirs.pop();
  activeIdx = Math.min(activeIdx, reservoirs.length-1);
  renderAll();
};

/* ============================================================
   UTILITAIRES DE FORMAT
   ============================================================ */
function esc(s){ return (s===undefined||s===null)?'':String(s).replace(/"/g,'&quot;'); }
function pad(s, width){ s=String(s); return s.length>=width ? s : ' '.repeat(width-s.length)+s; }
function fnum(x, width, dec){ return pad(Number(x).toFixed(dec), width); }
function fint(x, width){ return pad(String(parseInt(x)), width); }

/* Valeurs "effectives" côté vannes : forcées à 0 pour un réservoir naturel,
   sans jamais toucher aux données saisies (non destructif si on rebascule en géré). */
function effGate(r){
  const nat = r.type === 'natural';
  return {
    nGates: nat ? 0 : r.nGates,
    yGateSill: nat ? 0 : r.yGateSill,
    gateWidth: nat ? 0 : r.gateWidth,
    maxOpening: nat ? 0 : r.maxOpening,
    Cd_gate: nat ? 0 : r.Cd_gate,
    gate_frac: nat ? new Array(12).fill(0) : r.gate_frac,
    // pas de vannes -> pas de niveau d'exploitation à piloter ni de débit environnemental imposé
    nPenstock: nat ? 0 : r.nPenstock,
    dPenstock: nat ? 0 : r.dPenstock,
    Cd_penstock: nat ? 0 : r.Cd_penstock,
    yOptLevel: nat ? 0 : r.yOptLevel,
    Qenv: nat ? 0 : r.Qenv,
    minOpLevel: nat ? 0 : r.minOpLevel
  };
}

/* ============================================================
   GENERATION DES 4 FICHIERS
   ============================================================ */
function genFixed(){
  let out = '';
  out += '!=========================================================================\n';
  out += '! Reservoir_fixed.txt — '+(lang==='fr'?'généré par le configurateur de réservoirs':'generated by the reservoir configurator')+'\n';
  out += '!\n';
  out += '! '+(lang==='fr'?'Paramètres physiques fixes (ne pas calibrer).':'Fixed physical parameters (do not calibrate).')+'\n';
  out += '! '+reservoirs.length+' '+(lang==='fr'?'réservoir(s)':'reservoir(s)')+' : '+reservoirs.map((r,i)=>(i+1)+'.'+r.name+' ['+(r.type==='natural'?'natural':'managed')+']').join(', ')+'\n';
  out += '!\n';
  out += '! '+(lang==='fr'?'Paramètres par réservoir':'Parameters per reservoir')+' :\n';
  out += '!   [1] outlet mini-catchment ID\n';
  out += '!   [2] nPenstock  dPenstock[m]  minOpLevel[m]\n';
  out += '!   [3] nGates  yGateSill[m]  GateWidth_per_gate[m]  MaxOpening[m]  (0 if natural reservoir)\n';
  out += '!   [4] ySpillwayCrest[m]  SpillwayLength[m]\n';
  out += '!   [5] yOptLevel[m]\n';
  out += '!=========================================================================\n\n';
  out += reservoirs.length+'          ! number of reservoirs\n\n';

  reservoirs.forEach((r,i)=>{
    const g = effGate(r);
    out += '!--------------------------------------------------------------------------\n';
    out += '!--- RESERVOIR '+(i+1)+' : '+r.name+'  ['+(r.type==='natural'?'NATURAL — no gates':'MANAGED')+']\n';
    out += '!--------------------------------------------------------------------------\n\n';
    out += '! [1] outlet mini-catchment ID\n'+r.outlet_mini_id+'\n\n';
    out += '! [2] nPenstock  dPenstock[m]  minOpLevel[m]  (0 if natural reservoir)\n';
    out += g.nPenstock+'          '+g.dPenstock.toFixed(2)+'          '+g.minOpLevel.toFixed(2)+'\n\n';
    out += '! [3] nGates  yGateSill[m]  GateWidth_per_gate[m]  MaxOpening[m]\n';
    out += g.nGates+'          '+g.yGateSill.toFixed(2)+'         '+g.gateWidth.toFixed(2)+'               '+g.maxOpening.toFixed(2)+'\n\n';
    out += '! [4] ySpillwayCrest[m]  SpillwayLength[m]\n';
    out += r.spillCrest.toFixed(2)+'         '+r.spillLength.toFixed(2)+'\n\n';
    out += '! [5] yOptLevel[m]  (0 if natural reservoir — no gates to operate)\n';
    out += g.yOptLevel.toFixed(2)+'\n\n\n';
  });
  return out.trimEnd()+'\n';
}

function genCalib(){
  let out = '';
  out += '!=========================================================================\n';
  out += '! Reservoir_calib.txt — '+(lang==='fr'?'généré par le configurateur de réservoirs':'generated by the reservoir configurator')+'\n';
  out += '!\n';
  out += '! '+(lang==='fr'?'PARAMETRES (par réservoir, dans l\'ordre)':'PARAMETERS (per reservoir, in order)')+' :\n';
  out += '!   [1] Y0               : '+(lang==='fr'?'niveau initial [m]':'initial level [m]')+'\n';
  out += '!   [2] gate_frac(1:12)  : '+(lang==='fr'?'ouverture mensuelle des vannes [0-1] (0 si naturel)':'monthly gate opening [0-1] (0 if natural)')+'\n';
  out += '!   [3] Qenv             : '+(lang==='fr'?'débit environnemental minimal [m³/s] (0 si naturel)':'minimum environmental flow [m³/s] (0 if natural)')+'\n';
  out += '!   [4] Cd_penstock  Cd_gate  Cd_spillway  (0  0 if natural)\n';
  out += '!   [5] yFillTarget      : '+(lang==='fr'?'seuil de protection de remplissage [m]':'filling protection threshold [m]')+'\n';
  out += '!=========================================================================\n\n';

  reservoirs.forEach((r,i)=>{
    const g = effGate(r);
    out += '!--------------------------------------------------------------------------\n';
    out += '!--- RESERVOIR '+(i+1)+' : '+r.name+'  ['+(r.type==='natural'?'NATURAL — no gates':'MANAGED')+']\n';
    out += '!--------------------------------------------------------------------------\n\n';
    out += '! [1] Y0 [m]\n'+r.Y0.toFixed(2)+'\n\n';
    out += '! [2] gate_frac [0-1]  (Jan-Dec, '+(lang==='fr'?'interpolation linéaire journalière':'linear daily interpolation')+')\n';
    out += '!  Jan    Feb    Mar    Apr    May    Jun    Jul    Aug    Sep    Oct    Nov    Dec\n';
    out += g.gate_frac.map(v=>v.toFixed(3)).join('  ')+'\n\n';
    out += '! [3] Qenv [m³/s]\n'+g.Qenv.toFixed(2)+'\n\n';
    out += '! [4] Cd_penstock  Cd_gate  Cd_spillway\n';
    out += g.Cd_penstock.toFixed(2)+'         '+g.Cd_gate.toFixed(2)+'     '+r.Cd_spillway.toFixed(2)+'\n\n';
    out += '! [5] yFillTarget [m]\n'+r.yFillTarget.toFixed(2)+'\n\n\n';
  });
  return out.trimEnd()+'\n';
}

function genFlag(){
  let out = '';
  out += '!=========================================================================\n';
  out += '! Reservoir_flag.txt — '+(lang==='fr'?'généré par le configurateur de réservoirs':'generated by the reservoir configurator')+'\n';
  out += '!\n';
  out += '! SECTION 1 – '+(lang==='fr'?'TOPOLOGIE  (une ligne par réservoir)':'TOPOLOGY (one line per reservoir)')+'\n';
  out += '!   ReservoirID   mini_Qout   nQin   mini_Qin(1:nQin)\n';
  out += '!\n';
  out += '! SECTION 2 – '+(lang==='fr'?'LISTE DES MINIS  (une ligne par mini appartenant au réservoir)':'LIST OF MINI-CATCHMENTS (one line per mini-catchment belonging to the reservoir)')+'\n';
  out += '!   ReservoirID   mini_iC\n';
  out += '!=========================================================================\n\n';

  out += '! SECTION 1 - TOPOLOGIE\n';
  out += '! ReservoirID   mini_Qout   nQin   mini_Qin\n';
  reservoirs.forEach((r,i)=>{
    const qins = r.mini_Qin.filter(x=>String(x).trim()!=='');
    out += (i+1)+'               '+r.outlet_mini_id+'\t'+qins.length+'\t'+qins.join(' ')+'\n';
  });
  out += '\n! SECTION 2 - LISTE DES MINIS\n';
  reservoirs.forEach((r,i)=>{
    out += '! --- '+r.name+' (Res. '+(i+1)+')\n';
    const minis = r.mini_list.filter(x=>String(x).trim()!=='');
    minis.forEach(m=>{ out += (i+1)+'               '+m+'\n'; });
    out += '\n';
  });
  return out.trimEnd()+'\n';
}

function genFLP(){
  let out = '   Minibacia       Z0(m)     Zfp(m)    Areafp(km2)   Volfp(km3)\n';
  reservoirs.forEach((r,i)=>{
    r.hsv.forEach(pt=>{
      out += fint(i+1,12) + fnum(r.Z0,11,2) + fnum(pt.z,11,2) + fnum(pt.a,15,2) + fnum(pt.v,13,4) + '\n';
    });
  });
  return out;
}

function download(filename, content){
  const blob = new Blob([content], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

document.getElementById('exportAll').onclick = ()=>{
  syncActiveFromDOM();
  try{
    download('Reservoir_fixed.txt', genFixed());
    download('Reservoir_calib.txt', genCalib());
    download('Reservoir_flag.txt', genFlag());
    download('COTA_AREA_VOL_RESERVOIR.FLP', genFLP());
    log(lang==='fr'
      ? '4 fichiers générés et téléchargés : Reservoir_fixed.txt, Reservoir_calib.txt, Reservoir_flag.txt, COTA_AREA_VOL_RESERVOIR.FLP'
      : '4 files generated and downloaded: Reservoir_fixed.txt, Reservoir_calib.txt, Reservoir_flag.txt, COTA_AREA_VOL_RESERVOIR.FLP');
  }catch(e){
    log((lang==='fr'?'Erreur lors de la génération : ':'Error during generation: ')+e.message);
  }
};

/* ============================================================
   IMPORT / PARSING DES FICHIERS EXISTANTS
   ============================================================ */
function stripComments(text){
  return text.split(/\r?\n/)
    .filter(l=>{ const t=l.trim(); return t.length && !t.startsWith('!'); });
}
function tokens(line){ return line.trim().split(/\s+/); }

function readFileAsText(file, cb){
  const reader = new FileReader();
  reader.onload = e => cb(e.target.result);
  reader.onerror = () => log((lang==='fr'?'Erreur de lecture du fichier ':'Error reading file ')+file.name);
  reader.readAsText(file);
}

document.getElementById('imp_fixed').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  readFileAsText(f, text=>{
    try{
      const lines = stripComments(text);
      let p = 0;
      const n = parseInt(tokens(lines[p++])[0]);
      for(let i=0;i<n;i++){
        if(!reservoirs[i]) reservoirs[i] = emptyReservoir((lang==='fr'?'Réservoir ':'Reservoir ')+(i+1));
        const r = reservoirs[i];
        r.outlet_mini_id = tokens(lines[p++])[0];
        let t2 = tokens(lines[p++]);
        r.nPenstock = parseInt(t2[0]); r.dPenstock = parseFloat(t2[1]); r.minOpLevel = parseFloat(t2[2]);
        t2 = tokens(lines[p++]);
        r.nGates = parseInt(t2[0]); r.yGateSill = parseFloat(t2[1]); r.gateWidth = parseFloat(t2[2]); r.maxOpening = parseFloat(t2[3]);
        if(r.nGates === 0) r.type = 'natural';
        t2 = tokens(lines[p++]);
        r.spillCrest = parseFloat(t2[0]); r.spillLength = parseFloat(t2[1]);
        r.yOptLevel = parseFloat(tokens(lines[p++])[0]);
      }
      while(reservoirs.length>n) reservoirs.pop();
      document.getElementById('nResInput').value = reservoirs.length;
      activeIdx = 0; renderAll();
      log((lang==='fr'?'Reservoir_fixed.txt importé : ':'Reservoir_fixed.txt imported: ')+n+(lang==='fr'?' réservoir(s).':' reservoir(s).'));
    }catch(err){ log((lang==='fr'?'Erreur d\'analyse de fixed.txt : ':'Error parsing fixed.txt: ')+err.message); }
  });
  e.target.value = '';
});

document.getElementById('imp_calib').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  readFileAsText(f, text=>{
    try{
      const lines = stripComments(text);
      let p = 0;
      let i = 0;
      while(p < lines.length){
        if(!reservoirs[i]) reservoirs[i] = emptyReservoir((lang==='fr'?'Réservoir ':'Reservoir ')+(i+1));
        const r = reservoirs[i];
        r.Y0 = parseFloat(tokens(lines[p++])[0]);
        const gf = tokens(lines[p++]).map(parseFloat);
        r.gate_frac = gf.length===12 ? gf : r.gate_frac;
        r.Qenv = parseFloat(tokens(lines[p++])[0]);
        const cd = tokens(lines[p++]).map(parseFloat);
        r.Cd_penstock = cd[0]; r.Cd_gate = cd[1]; r.Cd_spillway = cd[2];
        r.yFillTarget = parseFloat(tokens(lines[p++])[0]);
        i++;
      }
      while(reservoirs.length>i) reservoirs.pop();
      document.getElementById('nResInput').value = reservoirs.length;
      activeIdx = 0; renderAll();
      log((lang==='fr'?'Reservoir_calib.txt importé : ':'Reservoir_calib.txt imported: ')+i+(lang==='fr'?' réservoir(s).':' reservoir(s).'));
    }catch(err){ log((lang==='fr'?'Erreur d\'analyse de calib.txt : ':'Error parsing calib.txt: ')+err.message); }
  });
  e.target.value = '';
});

document.getElementById('imp_flag').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  readFileAsText(f, text=>{
    try{
      const lines = stripComments(text);
      let p = 0;
      const topo = [];
      while(p<lines.length){
        const t2 = tokens(lines[p]);
        if(t2.length>=3 && /^\d+$/.test(t2[0])){
          const id = parseInt(t2[0]);
          const qout = t2[1];
          const nqin = parseInt(t2[2]);
          const qins = t2.slice(3, 3+nqin);
          topo.push({id, qout, qins});
          p++;
        } else break;
      }
      topo.forEach(item=>{
        const i = item.id-1;
        if(!reservoirs[i]) reservoirs[i] = emptyReservoir((lang==='fr'?'Réservoir ':'Reservoir ')+(i+1));
        reservoirs[i].outlet_mini_id = item.qout;
        reservoirs[i].mini_Qin = item.qins.length ? item.qins : [""];
      });
      const lists = {};
      for(; p<lines.length; p++){
        const t2 = tokens(lines[p]);
        if(t2.length>=2 && /^\d+$/.test(t2[0])){
          const id = parseInt(t2[0]);
          (lists[id] = lists[id]||[]).push(t2[1]);
        }
      }
      Object.keys(lists).forEach(id=>{
        const i = parseInt(id)-1;
        if(!reservoirs[i]) reservoirs[i] = emptyReservoir((lang==='fr'?'Réservoir ':'Reservoir ')+(i+1));
        reservoirs[i].mini_list = lists[id];
      });
      const maxId = Math.max(topo.length, Object.keys(lists).length>0?Math.max(...Object.keys(lists).map(Number)):0);
      while(reservoirs.length>maxId) reservoirs.pop();
      document.getElementById('nResInput').value = reservoirs.length;
      activeIdx = 0; renderAll();
      log((lang==='fr'?'Reservoir_flag.txt importé : ':'Reservoir_flag.txt imported: ')+topo.length+(lang==='fr'?' réservoir(s) (topologie), ':' reservoir(s) (topology), ')+Object.keys(lists).length+(lang==='fr'?' liste(s) de minis.':' mini-catchment list(s).'));
    }catch(err){ log((lang==='fr'?'Erreur d\'analyse de flag.txt : ':'Error parsing flag.txt: ')+err.message); }
  });
  e.target.value = '';
});

document.getElementById('imp_flp').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  readFileAsText(f, text=>{
    try{
      const lines = text.split(/\r?\n/).filter(l=>l.trim().length);
      let start = 0;
      if(/Minibacia/i.test(lines[0])) start = 1;
      const groups = {};
      for(let p=start;p<lines.length;p++){
        const t2 = tokens(lines[p]);
        if(t2.length<5) continue;
        const id = parseInt(t2[0]);
        const z0 = parseFloat(t2[1]), zfp = parseFloat(t2[2]), area = parseFloat(t2[3]), vol = parseFloat(t2[4]);
        if(!groups[id]) groups[id] = {z0, pts:[]};
        groups[id].pts.push({z:zfp, a:area, v:vol});
      }
      const ids = Object.keys(groups).map(Number).sort((a,b)=>a-b);
      ids.forEach(id=>{
        const i = id-1;
        if(!reservoirs[i]) reservoirs[i] = emptyReservoir((lang==='fr'?'Réservoir ':'Reservoir ')+(i+1));
        reservoirs[i].Z0 = groups[id].z0;
        reservoirs[i].hsv = groups[id].pts;
      });
      while(reservoirs.length>ids.length) reservoirs.pop();
      document.getElementById('nResInput').value = reservoirs.length;
      activeIdx = 0; renderAll();
      log((lang==='fr'?'.FLP importé : ':'.FLP imported: ')+ids.length+(lang==='fr'?' réservoir(s), ':' reservoir(s), ')+ids.map(id=>groups[id].pts.length+' pts').join(' / ')+'.');
    }catch(err){ log((lang==='fr'?'Erreur d\'analyse du .FLP : ':'Error parsing .FLP: ')+err.message); }
  });
  e.target.value = '';
});

/* ============================================================
   FICHE RECAPITULATIVE — schéma de barrage + courbe hypso + export
   ============================================================ */

// ---- petit utilitaire d'échelle linéaire ----
function scaleLin(domain, range){
  const [d0,d1] = domain, [r0,r1] = range;
  const k = (d1-d0)===0 ? 0 : (r1-r0)/(d1-d0);
  return x => r0 + (x-d0)*k;
}

// ---- SVG : schéma de coupe du barrage ----
function svgDamSchema(r){
  const isNatural = r.type === 'natural';
  const W = 520, H = 300;
  const levels = [r.Z0, r.minOpLevel, r.yGateSill, r.Y0, r.spillCrest, r.yFillTarget]
    .concat(isNatural ? [] : [r.yOptLevel])
    .map(Number).filter(v=>!isNaN(v));
  let zMin = levels.length ? Math.min(...levels) : 0;
  let zMax = levels.length ? Math.max(...levels) : 1;
  if(zMax - zMin < 1e-6){ zMax = zMin+1; }
  const pad = (zMax-zMin)*0.18;
  zMin -= pad; zMax += pad*1.6;

  const top = 20, bottom = H-34, left = 70, right = W-30;
  const y = scaleLin([zMin,zMax],[bottom,top]);

  const groundY = bottom;
  const damLeft = left+70, damRight = right-40;
  const waterLevelY = y(r.Y0||zMin);
  const crestY = y(r.spillCrest||zMin);
  const sillY = y(r.yGateSill||zMin);
  const floorY = y(r.Z0||zMin);
  const optY = y(r.yOptLevel||zMin);
  const fillY = y(r.yFillTarget||zMin);
  const minOpY = y(r.minOpLevel||zMin);

  function levelLine(yy, color, label, dash){
    return `<line x1="${left}" y1="${yy}" x2="${right}" y2="${yy}" stroke="${color}" stroke-width="1.1" stroke-dasharray="${dash||'4,3'}"/>
      <text x="${right+4}" y="${yy+3}" font-size="9.5" fill="${color}">${label}</text>`;
  }

  const damTopY = Math.min(crestY, sillY) - 14;

  let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">`;
  s += `<rect x="0" y="${groundY}" width="${W}" height="${H-groundY}" fill="#e9e4d6"/>`;
  s += `<line x1="0" y1="${groundY}" x2="${W}" y2="${groundY}" stroke="#a89a76" stroke-width="1.4"/>`;

  s += `<rect x="${left}" y="${Math.min(waterLevelY,groundY)}" width="${damLeft-left}" height="${Math.max(groundY-waterLevelY,0)}" fill="#bfe0f0" opacity="0.85"/>`;

  s += `<polygon points="${damLeft},${groundY} ${damLeft+18},${damTopY} ${damRight-18},${damTopY} ${damRight},${groundY}" fill="#a3adb1" stroke="#78838a" stroke-width="1.2"/>`;

  const spLeft = damRight-18-60, spRight = damRight-18;
  s += `<rect x="${spLeft}" y="${crestY}" width="${spRight-spLeft}" height="${Math.max(damTopY - crestY,0)}" fill="#d4dadc"/>`;
  s += `<line x1="${spLeft}" y1="${crestY}" x2="${spRight}" y2="${crestY}" stroke="#1f6753" stroke-width="2"/>`;
  if((r.Y0||0) > (r.spillCrest||0)){
    s += `<path d="M ${(spLeft+spRight)/2} ${crestY+4} q 14 18 4 34" stroke="#2f8f76" stroke-width="2" fill="none" marker-end="url(#arrow)"/>`;
  }

  if(!isNatural){
    const gx = damLeft+22, gw=16;
    s += `<rect x="${gx}" y="${sillY-26}" width="${gw}" height="26" fill="#5f6f73" stroke="#374443" stroke-width="1"/>`;
    s += `<line x1="${gx}" y1="${sillY}" x2="${gx+gw}" y2="${sillY}" stroke="#c1543b" stroke-width="2"/>`;
    s += `<text x="${gx-4}" y="${sillY-30}" font-size="9" fill="#374443" text-anchor="middle">${lang==='fr'?'Vanne(s)':'Gate(s)'}</text>`;
  } else {
    s += `<text x="${damLeft+30}" y="${damTopY-4}" font-size="9" fill="#7c8683" text-anchor="middle">${lang==='fr'?'Pas de vanne — surverse libre':'No gate — free overflow'}</text>`;
  }

  if(!isNatural){
    const pTopY = minOpY;
    s += `<rect x="${damLeft-6}" y="${pTopY-5}" width="${damRight-damLeft+30}" height="10" fill="#827052" stroke="#4f4330" stroke-width="1" transform="rotate(4 ${damLeft} ${pTopY})"/>`;
    s += `<text x="${damRight+2}" y="${pTopY+18}" font-size="9" fill="#4f4330">${lang==='fr'?'Conduite forcée':'Penstock'}</text>`;
  }

  s += levelLine(crestY, '#1f6753', `${lang==='fr'?'Crête déversoir':'Spillway crest'} ${fmt1(r.spillCrest)} m`);
  if(!isNatural) s += levelLine(sillY, '#c1543b', `${lang==='fr'?'Seuil vannes':'Gate sill'} ${fmt1(r.yGateSill)} m`);
  s += levelLine(waterLevelY, '#2f8f76', `${lang==='fr'?'Niveau Y0':'Level Y0'} ${fmt1(r.Y0)} m`, '2,2');
  if(!isNatural) s += levelLine(optY, '#7c8683', `${lang==='fr'?'Niveau optimal':'Optimal level'} ${fmt1(r.yOptLevel)} m`);
  s += levelLine(fillY, '#8a6d3b', `${lang==='fr'?'Cible remplissage':'Filling target'} ${fmt1(r.yFillTarget)} m`);
  s += levelLine(floorY, '#555', `${lang==='fr'?'Fond Z0':'Floor Z0'} ${fmt1(r.Z0)} m`);

  s += `<defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#2f8f76"/></marker></defs>`;
  s += `</svg>`;
  return s;
}

function fmt1(x){ x=Number(x); return isNaN(x)?'–':x.toFixed(2); }

// ---- SVG : courbe hypsométrique (Cote vs Surface et Cote vs Volume) ----
function svgHypsoCurve(r){
  const W=520, H=260;
  const pts = (r.hsv||[]).filter(p=>!isNaN(p.z));
  if(pts.length < 2){
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <text x="${W/2}" y="${H/2}" font-size="12" fill="#888" text-anchor="middle">${lang==='fr'?'Courbe H-S-V insuffisante (≥2 points requis)':'Not enough E-A-V data (≥2 points required)'}</text>
      </svg>`;
  }
  const sorted = [...pts].sort((a,b)=>a.z-b.z);
  const zArr = sorted.map(p=>p.z), aArr = sorted.map(p=>p.a), vArr = sorted.map(p=>p.v);
  const zMin=Math.min(...zArr), zMax=Math.max(...zArr);
  const aMax=Math.max(...aArr,0.0001), vMax=Math.max(...vArr,0.0001);

  const top=18, bottom=H-34, left=46, right=W-46;
  const y = scaleLin([zMin,zMax],[bottom,top]);
  const xA = scaleLin([0,aMax],[left,right]);
  const xV = scaleLin([0,vMax],[left,right]);

  function path(xScale, arr){
    return sorted.map((p,i)=>`${i===0?'M':'L'} ${xScale(arr[i]).toFixed(1)} ${y(p.z).toFixed(1)}`).join(' ');
  }

  let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">`;
  s += `<line x1="${left}" y1="${top}" x2="${left}" y2="${bottom}" stroke="#999" stroke-width="1"/>`;
  s += `<line x1="${left}" y1="${bottom}" x2="${right}" y2="${bottom}" stroke="#999" stroke-width="1"/>`;
  for(let i=0;i<=4;i++){
    const zz = zMin + (zMax-zMin)*i/4;
    const yy = y(zz);
    s += `<line x1="${left-3}" y1="${yy}" x2="${left}" y2="${yy}" stroke="#999"/>`;
    s += `<text x="${left-6}" y="${yy+3}" font-size="8.5" fill="#666" text-anchor="end">${zz.toFixed(1)}</text>`;
  }
  s += `<text x="${left-36}" y="${(top+bottom)/2}" font-size="9" fill="#444" transform="rotate(-90 ${left-36} ${(top+bottom)/2})" text-anchor="middle">${lang==='fr'?'Cote Z [m]':'Level Z [m]'}</text>`;

  s += `<path d="${path(xA,aArr)}" fill="none" stroke="#2f8f76" stroke-width="1.8"/>`;
  s += `<path d="${path(xV,vArr)}" fill="none" stroke="#c1543b" stroke-width="1.8" stroke-dasharray="5,3"/>`;

  s += `<text x="${left}" y="${bottom+14}" font-size="8.5" fill="#2f8f76">0</text>`;
  s += `<text x="${right}" y="${bottom+14}" font-size="8.5" fill="#2f8f76" text-anchor="end">${lang==='fr'?'Aire max':'Max area'} ${aMax.toFixed(2)} km²</text>`;
  s += `<text x="${right}" y="${bottom+25}" font-size="8.5" fill="#c1543b" text-anchor="end">${lang==='fr'?'Vol max':'Max vol'} ${vMax.toFixed(3)} km³</text>`;

  s += `<line x1="${left}" y1="${top-4}" x2="${left+14}" y2="${top-4}" stroke="#2f8f76" stroke-width="2"/>`;
  s += `<text x="${left+18}" y="${top-1}" font-size="9" fill="#333">${lang==='fr'?'Surface (km²)':'Area (km²)'}</text>`;
  s += `<line x1="${left+110}" y1="${top-4}" x2="${left+124}" y2="${top-4}" stroke="#c1543b" stroke-width="2" stroke-dasharray="5,3"/>`;
  s += `<text x="${left+128}" y="${top-1}" font-size="9" fill="#333">${lang==='fr'?'Volume (km³)':'Volume (km³)'}</text>`;

  s += `</svg>`;
  return s;
}

            ${kv(t('kQin'), qins.length?esc(qins.join(', ')):'–')}
            ${kv(t('kMinis'), minis.length||'–')}
          </table>
        </div>

        <div class="sheet-block">
          <h3>${t('structTitle')}</h3>
          <table class="kv-table">
            ${kv(t('kZ0'), fmt1(r.Z0)+" m")}
            ${kv(t('kMinOp'), fmt1(r.minOpLevel)+" m")}
            ${isNatural ? kv(t('kOptLvl'), na, true) : kv(t('kOptLvl'), fmt1(r.yOptLevel)+" m")}
            ${kv(t('kCrest'), fmt1(r.spillCrest)+" m")}
            ${kv(t('kSpillLen'), fmt1(r.spillLength)+" m")}
            ${isNatural ? kv(t('kNGates'), na, true) : kv(t('kNGates'), r.nGates)}
            ${isNatural ? kv(t('kSill'), na, true) : kv(t('kSill'), fmt1(r.yGateSill)+" m")}
            ${isNatural ? kv(t('kGateW'), na, true) : kv(t('kGateW'), fmt1(r.gateWidth)+" m")}
            ${isNatural ? kv(t('kMaxOpen'), na, true) : kv(t('kMaxOpen'), fmt1(r.maxOpening)+" m")}
            ${isNatural ? kv(t('kNPenstock'), na, true) : kv(t('kNPenstock'), r.nPenstock)}
            ${isNatural ? kv(t('kDPenstock'), na, true) : kv(t('kDPenstock'), fmt1(r.dPenstock)+" m")}
          </table>
        </div>

        <div class="sheet-block">
          <h3>${t('calibTitle')}</h3>
          <table class="kv-table">
            ${kv(t('kY0'), fmt1(r.Y0)+" m")}
            ${isNatural ? kv(t('kQenv'), na, true) : kv(t('kQenv'), fmt1(r.Qenv)+" m³/s")}
            ${kv(t('kFillTarget'), fmt1(r.yFillTarget)+" m")}
            ${isNatural ? kv(t('kCdPenstock'), na, true) : kv(t('kCdPenstock'), fmt1(r.Cd_penstock))}
            ${isNatural ? kv(t('kCdGate'), na, true) : kv(t('kCdGate'), fmt1(r.Cd_gate))}
            ${kv(t('kCdSpillway'), fmt1(r.Cd_spillway))}
          </table>
          ${isNatural ? `<div class="hint" style="margin-top:4px">${na} — ${lang==='fr'?'pas de vannes à exploiter':'no gates to operate'}</div>` : `
          <div class="hint" style="margin-top:4px">${t('gateFracMiniHint')}</div>

            <tr>${months.map(m=>`<th>${m}</th>`).join('')}</tr>

          </table>`}

      <div>

        <div class="sheet-fig">
          <div style="font-size:10.5px;font-weight:600;color:var(--accent-dark);margin-bottom:2px">${t('curveTitle')}</div>

function getSheetReservoirList(){
  const all = document.getElementById('sheetAllChk').checked;
  if(all) return reservoirs.map((r,i)=>({r,i}));
  const sel = parseInt(document.getElementById('sheetResSelect').value);
  return [{r:reservoirs[sel], i:sel}];
}

function renderSheet(){
  const area = document.getElementById('printArea');
  const list = getSheetReservoirList();
  area.innerHTML = list.map(({r,i})=>buildSheetHTML(r,i)).join('');
}

function populateSheetSelect(){
  const sel = document.getElementById('sheetResSelect');
  sel.innerHTML = reservoirs.map((r,i)=>`<option value="${i}">${i+1}. ${esc(r.name||t('tabDefaultName')+' '+(i+1))}</option>`).join('');
  sel.value = activeIdx;
}

function b64ToUtf8(b64str){
  const binary = atob(b64str);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

let damFrameLoaded = false;
function ensureDamFrameLoaded(){
  if(damFrameLoaded) return;
  const html = b64ToUtf8(DAM_MODULE_B64);
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const frame = document.getElementById('damFrame');
  frame.src = url;
  frame.onload = () => {
    document.getElementById('schemaLoading').style.display = 'none';
    frame.style.display = 'block';
  };
  damFrameLoaded = true;
}

function switchOuterPage(page){
  const cfg = document.getElementById('page-config');
  const sch = document.getElementById('page-schema');
  document.querySelectorAll('.outer-tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.page===page));
  if(page==='schema'){
    cfg.classList.add('hidden');
    sch.classList.add('active');
    ensureDamFrameLoaded();
  } else {
    cfg.classList.remove('hidden');
    sch.classList.remove('active');
  }
}
</script>
